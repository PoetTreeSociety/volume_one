            navigate(dir, fromDrag = false) {
                const isMobileView = window.innerWidth <= 768;

                if (isMobileView && !fromDrag) {
                    // Mobile Linear Navigation Logic
                    if (dir === 1) {
                        if (this.state.mobileTab === 'left') {
                            this.setMobileTab('right');
                        } else {
                            const newSpread = this.state.currentSpread + 1;
                            if (newSpread < initialBookData.length) {
                                this.autoFlipPage(newSpread, 1);
                            }
                        }
                    } else { // dir === -1
                        if (this.state.mobileTab === 'right') {
                            this.setMobileTab('left');
                        } else {
                            const newSpread = this.state.currentSpread - 1;
                            if (newSpread >= 0) {
                                this.state.mobileTab = 'right'; // Prep for slide in from left
                                this.autoFlipPage(newSpread, -1);
                            }
                        }
                    }
                    return;
                }

                const newSpread = this.state.currentSpread + dir;
                if (newSpread >= 0 && newSpread < initialBookData.length) {
                    if (fromDrag) {
                        this.state.currentSpread = newSpread;
                        this.state.mobileTab = dir === 1 ? 'left' : 'right';
                        this.renderSpread();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else {
                        this.autoFlipPage(newSpread, dir > 0 ? 1 : -1);
                    }
                }
            },

            jumpToSpread(id) {
                if (id === this.state.currentSpread) return;
                const dir = id > this.state.currentSpread ? 1 : -1;
                this.autoFlipPage(id, dir);
            },

            autoFlipPage(newSpread, dir) {
                if (this.state.isRecording) this.stopRecording();
                const isMobileView = window.innerWidth <= 768;

                if (isMobileView) {
                    // Temporarily grab both to slide out the old and slide in the new
                    const outPage = this.state.mobileTab === 'right' ? this.dom.pageRight : this.dom.pageLeft; 
                    outPage.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
                    outPage.style.transform = dir === 1 ? 'translateX(-100%)' : 'translateX(100%)';
                    outPage.style.opacity = '0';
                    
                    setTimeout(() => {
                        outPage.style.transition = '';
                        outPage.style.transform = '';
                        outPage.style.opacity = '1';
                        this.state.currentSpread = newSpread;
                        // Determine starting tab for new spread on mobile
                        this.state.mobileTab = dir === 1 ? 'left' : 'right';
                        this.renderSpread();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }, 300);
                    return;
                }

                const page = dir === 1 ? this.dom.pageRight : this.dom.pageLeft;
                const curl = dir === 1 ? this.dom.curlRight : this.dom.curlLeft;
                
                // Prepare underlays for desktop auto-flip
                if (dir === 1) {
                    this.dom.underlayRight.classList.remove('hidden');
                    this.renderPageData(newSpread, null, this.dom.underlayRightContent, true);
                } else {
                    this.dom.underlayLeft.classList.remove('hidden');
                    this.renderPageData(newSpread, this.dom.underlayLeftContent, null, true);
                }

                page.style.transformOrigin = dir === 1 ? 'left center' : 'right center';
                page.style.transition = '0.6s';
                curl.style.transition = '0.6s';
                page.style.zIndex = '50';
                curl.style.opacity = '1';
                
                void page.offsetWidth;
                
                if (dir === 1) {
                    page.style.transform = `rotateY(-180deg)`;
                    curl.style.transform = `rotateY(-180deg)`;
                    curl.style.opacity = '0';
                } else {
                    page.style.transform = `rotateY(180deg)`;
                    curl.style.transform = `rotateY(180deg)`;
                    curl.style.opacity = '0';
                }
                
                setTimeout(() => {
                    this.dom.underlayRight.classList.add('hidden');
                    this.dom.underlayLeft.classList.add('hidden');
                    
                    page.style.transition = '';
                    curl.style.transition = '';
                    page.style.transform = '';
                    curl.style.transform = '';
                    page.style.zIndex = '';
                    
                    this.state.currentSpread = newSpread;
                    this.state.mobileTab = 'left';
                    this.renderSpread();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 600);
            },

            setMobileTab(tab) {
                this.state.mobileTab = tab;
                this.renderSpread();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            // --- AI & RECORDING LOGIC ---
            async fetchWithRetry(url, options, retries = 5) {
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        return await response.json();
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(r => setTimeout(r, delays[i]));
                    }
                }
            },

            async startRecording() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    // iOS/Safari Fix: iOS requires specific MIME types and often rejects 'audio/webm'
                    let mimeType = '';
                    if (window.MediaRecorder && MediaRecorder.isTypeSupported('audio/webm')) {
                        mimeType = 'audio/webm';
                    } else if (window.MediaRecorder && MediaRecorder.isTypeSupported('audio/mp4')) {
                        mimeType = 'audio/mp4';
                    }

                    const options = mimeType ? { mimeType } : {};
                    this.mediaRecorder = new MediaRecorder(stream, options);
                    this.audioChunks = [];
                    
                    this.mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) this.audioChunks.push(e.data);
                    };
                    
                    this.mediaRecorder.onstop = () => {
                        // Fallback to audio/mp4 for iOS if mimeType wasn't strictly defined
                        const audioBlob = new Blob(this.audioChunks, { type: mimeType || 'audio/mp4' });
                        const url = URL.createObjectURL(audioBlob);
                        this.state.recordings[this.state.currentSpread] = url;
                        this.audioChunks = [];
                        this.renderSpread();
                    };
                    
                    this.mediaRecorder.start();
                    this.state.isRecording = true;
                    this.renderSpread();
                } catch (err) {
                    console.error("Mic error:", err);
                    alert("Microphone access is required. On iOS/iPad, ensure you are using Safari, the site is loaded via HTTPS, and permissions are allowed in your Settings.");
                }
            },

            stopRecording() {
                if (this.mediaRecorder && this.state.isRecording) {
                    this.mediaRecorder.stop();
                    this.mediaRecorder.stream.getTracks().forEach(track => track.stop());
                }
                this.state.isRecording = false;
                this.renderSpread();
            },

            toggleRecording() {
                if (this.state.isRecording) this.stopRecording();
                else this.startRecording();
            },

                            <div class="mt-8 text-[11px] leading-relaxed font-sans text-gray-500 max-w-sm text-center transform -rotate-1 relative z-10 opacity-75 pb-4 px-4">
                                <strong>© 2026 Preye. All Rights Reserved.</strong><br/>
                                No part of this publication may be reproduced, distributed, or transmitted in any form or by any means, including photocopying, recording, or other electronic or mechanical methods, without the prior written permission of the author.
                            </div>

                            <div class="absolute right-4 bottom-4 w-32 h-32 opacity-20 pointer-events-none transform rotate-3 text-[#3A3B3C] z-0">${svgs.cover}</div>
                            ${randomDoodlesHTML}
                        </div>
                        
                        <div class="mt-auto w-full flex justify-between items-end pointer-events-none pt-4 pb-12 md:pb-4 pl-8 md:pl-10 relative z-20">
                            <div class="relative flex items-center justify-center mt-2 transform -rotate-2">
                                <img src="https://www.dropbox.com/scl/fi/1ysen7yupp2zknxy9u7fa/1000022135-removebg-preview.png?rlkey=msqjx6lrb7uui8v3kzggq2knr&st=km4td068&raw=1" 
                                     alt="Poet-Tree Logo" 
                                     referrerpolicy="no-referrer"
                                     class="w-24 md:w-32 object-contain drop-shadow-sm opacity-90" />
                            </div>
                            <div class="text-right font-pencil text-gray-500 pr-4 pb-2 md:pb-4">Inside Cover</div>
                        </div>
                    `;

                    let tocList = initialBookData.slice(1).map(item => `
                        <li class="flex justify-between items-baseline font-pencil text-2xl group">
                            <span class="interactive-link" data-id="${item.id}">${item.id}. ${item.title} ${item.isInteractive ? '<span class="text-xl ml-2">✨</span>' : ''}</span>
                            <span class="text-gray-400 text-lg opacity-50 group-hover:opacity-100 transition-opacity">pg. ${item.id * 2 - 1}</span>
                        </li>
                    `).join("");

                    let rightHTML = `
                        <div class="min-h-full flex flex-col justify-start relative flex-grow pb-16">
                            <h1 class="font-title text-center mb-8 border-b-2 border-gray-400 border-dashed pb-2 relative z-10">Table of Contents</h1>
                            <ul class="space-y-4 max-w-md mx-auto w-full relative z-10 pb-8">${tocList}</ul>
                            ${randomDoodlesHTML}
                            <div class="mt-auto w-full text-right font-pencil text-gray-500 pointer-events-none pt-4 pb-4">Table of Contents</div>
                        </div>
                    `;

                    if (leftTarget) leftTarget.innerHTML = leftHTML;
                    if (rightTarget) rightTarget.innerHTML = rightHTML;

                } else {
                    let recordingUrl = this.state.recordings[index];
                    let recordingHTML = "";
                    if (!recordingUrl) {
                        recordingHTML = `
                            <button ${isUnderlay ? '' : 'id="btn-toggle-record"'} class="font-pencil text-lg bg-white bg-opacity-70 px-3 py-1 rounded border border-gray-300 shadow hover:bg-gray-50 transition flex items-center gap-2 transform rotate-1">
                                ${this.state.isRecording && !isUnderlay ? '<span class="text-red-500 animate-pulse">● Stop Recording</span>' : '🎤 Record Yourself'}
                            </button>
                        `;
                    } else {
                        recordingHTML = `
                            <div class="flex items-center gap-2 bg-white bg-opacity-70 p-1 rounded border border-gray-300 shadow transform rotate-1">
                                <audio src="${recordingUrl}" controls playsinline class="h-8 w-48"></audio>
                                <button class="btn-delete-recording text-red-500 hover:text-red-700 px-2 text-xl" title="Delete Recording">🗑️</button>
                            </div>
                        `;
                    }

                    let contentArea = data.isInteractive ? `
                        <textarea ${isUnderlay ? '' : 'id="user-poem-input"'} class="pencil-input font-pencil text-xl text-rhythm flex-grow min-h-[50vh]" placeholder="Start writing your poem here in pencil...">${this.state.userPoem}</textarea>
                    ` : `<div class="font-pencil text-rhythm whitespace-pre-wrap text-xl leading-[32px]">${data.poem}</div>`;

                    let leftHTML = `
                        <div class="pr-4 relative min-h-full flex flex-col flex-grow pb-16">
                            <div class="flex justify-between items-start mb-6 relative z-10 flex-wrap gap-4">
                                <h2 class="font-title leading-none text-4xl">${data.title}</h2>
                                <div class="flex flex-col items-end gap-2 z-20">${recordingHTML}</div>
                            </div>
                            <div class="flex-grow relative z-10 flex flex-col">
                                ${contentArea}
                                <div class="mt-8 flex justify-center w-full relative z-20 pb-4">
                                    <button class="mobile-tab-btn-right mobile-tab-btn font-red-pen text-2xl bg-red-50 px-6 py-3 rounded-lg border-2 border-red-400 shadow-md hover:bg-red-100 transition items-center justify-center gap-2 transform -rotate-1">
                                        📝 Read Teacher's Analysis 👉
                                    </button>
                                </div>
                            </div>
                            ${data.doodle ? `<div class="absolute right-4 bottom-16 w-32 h-32 md:w-56 md:h-56 opacity-10 pointer-events-none transform -rotate-6 text-[#3A3B3C] z-0">${data.doodle}</div>` : ''}
                            ${randomDoodlesHTML}
                            <div class="mt-auto w-full text-right font-pencil text-gray-500 pointer-events-none pt-8 pb-4">Pg. ${index * 2 - 1}</div>
                        </div>
                    `;

                    let breakdown = data.isInteractive ? this.state.userBreakdown : data.breakdown;
                    let breakdownHTML = "";

                    if (data.isInteractive && !breakdown) {
                        const canSubmit = this.state.userPoem.trim().length > 0;
                        breakdownHTML = `
                            <div ${isUnderlay ? '' : 'id="ai-breakdown-container"'} class="flex flex-col items-center justify-center h-full pt-20">
                                <button ${isUnderlay ? '' : 'id="btn-ai-grade"'} ${canSubmit ? '' : 'disabled'} class="font-red-pen text-2xl border-2 border-red-500 rounded-lg px-6 py-3 transform -rotate-2 shadow-lg transition-all ${canSubmit ? 'hover:bg-red-50 hover:scale-105 bg-white bg-opacity-70 cursor-pointer' : 'opacity-50 cursor-not-allowed'}">
                                    ✨ Submit Poem for AI Grading
                                </button>
                            </div>
                        `;
                    } else if (breakdown) {
                        let themesList = breakdown.themes.map(t => `<li class="font-pencil text-lg flex items-center"><span class="text-red-500 mr-2 text-sm">★</span> ${t}</li>`).join("");
                        
                        let lyricsList = `<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">` + (breakdown.lyrics || []).map(lyric => `
                            <div class="flip-card group" onclick="this.classList.toggle('flipped')">
                                <div class="flip-card-inner">
                                    <div class="flip-card-front bg-yellow-50">
                                        <div class="absolute -top-2 -left-2 text-6xl text-gray-300 font-kalam opacity-60">"</div>
                                        <div class="font-pencil text-rhythm text-[1.15rem] italic text-gray-800 text-center leading-tight">...${lyric.quote}...</div>
                                        <div class="absolute bottom-2 right-3 flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                            <span class="text-xs font-sans uppercase tracking-widest text-red-400 font-bold">Flip</span>
                                            <span class="text-lg text-red-500 transform rotate-90">⤿</span>
                                        </div>
                                    </div>
                                    <div class="flip-card-back">
                                        <div class="font-red-pen font-bold text-lg mb-1 border-b border-red-300 w-full text-center pb-1">Teacher's Note:</div>
                                        <div class="font-red-pen text-rhythm transform -rotate-1 text-base text-center leading-tight">
                                            ${lyric.note}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join("") + `</div>`;

                        let finalNoteHTML = breakdown.finalNote ? `
                            <div class="mt-8 p-4 border-2 border-red-400 rounded-md transform rotate-1 relative bg-white bg-opacity-40">
                                <div class="absolute -top-4 -right-2 w-8 h-8 bg-red-100 rounded-full flex items-center justify-center border border-red-300 transform rotate-12">
                                    <span class="font-red-pen font-bold text-red-600">A+</span>
                                </div>
                                <div class="font-red-pen text-rhythm transform -rotate-1 font-bold text-lg mb-2">Final Note:</div>
                                <div class="font-red-pen text-rhythm transform -rotate-1 text-base">${breakdown.finalNote}</div>
                            </div>
                        ` : "";

                        let podcastHTML = data.podcastUrl ? `
                            <div class="mt-8 border-t-2 border-dashed border-gray-300 pt-6">
                                <div class="font-red-pen text-rhythm transform -rotate-1 font-bold text-xl mb-4 relative flex items-center gap-2">
                                    🎙️ Deep Discussion Podcast
                                </div>
                                <div class="bg-white bg-opacity-60 border border-gray-300 p-4 rounded-xl shadow-sm flex flex-col items-center gap-3 transform rotate-1">
                                    <div class="w-full h-36 bg-[#FDFBF7] rounded-lg flex flex-col items-center justify-center border-2 border-gray-400 cursor-pointer hover:bg-gray-100 transition relative overflow-hidden group shadow-inner" onclick="const audio = this.nextElementSibling; if (audio.paused) { const p = audio.play(); if(p) p.catch(e => alert('Please press the Play button on the audio controls below (iOS Security).')); } else { audio.pause(); }">
                                        <div class="absolute inset-0 bg-red-100 opacity-0 group-hover:opacity-10 transition"></div>
                                        <!-- Cassette Tape SVG Image -->
                                        <svg viewBox="0 0 100 60" class="w-24 h-24 text-[#3A3B3C] group-hover:scale-105 transition transform drop-shadow-md" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <rect x="5" y="5" width="90" height="50" rx="5" fill="#e5e5e5" />
                                            <rect x="25" y="15" width="50" height="30" rx="3" fill="#1a1a1a" />
                                            <circle cx="35" cy="30" r="8" fill="#FDFBF7" />
                                            <circle cx="65" cy="30" r="8" fill="#FDFBF7" />
                                            <path d="M 43 30 L 57 30" stroke="#FDFBF7" />
                                            <rect x="15" y="5" width="70" height="10" fill="#F0AEB1" opacity="0.3" stroke="none" />
                                            <text x="50" y="13" font-family="'Caveat', cursive" font-size="6" fill="#D32F2F" text-anchor="middle" stroke="none">${data.title} Tape</text>
                                        </svg>
                                        <div class="absolute flex items-center justify-center w-10 h-10 bg-red-500 rounded-full text-white shadow-lg opacity-80 group-hover:opacity-100 group-hover:scale-110 transition transform">
                                            <svg class="w-5 h-5 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                        </div>
                                        <span class="absolute bottom-2 font-pencil text-gray-500 text-sm">Click Tape to Play/Pause</span>
                                    </div>
                                    <audio src="${data.podcastUrl}" controls playsinline preload="metadata" class="w-full h-10 outline-none rounded-full"></audio>
                                </div>
                            </div>
                        ` : "";

                        breakdownHTML = `
                            <div class="space-y-6 opacity-100 transition-opacity duration-500">
                                <div>
                                    <div class="font-red-pen text-rhythm transform -rotate-1 font-bold text-xl mb-1 circled inline-block px-2">Inspiration</div>
                                    <div class="font-pencil text-rhythm whitespace-pre-wrap text-lg text-gray-700 ml-4">${breakdown.inspiration}</div>
                                </div>
                                <div>
                                    <div class="font-red-pen text-rhythm transform -rotate-1 font-bold text-xl mb-1 inline-block border-b border-red-400">Key Themes</div>
                                    <ul class="list-none ml-4 space-y-2 mt-2">${themesList}</ul>
                                </div>
                                <div class="mt-8 border-t-2 border-dashed border-gray-300 pt-6">
                                    <div class="font-red-pen text-rhythm transform -rotate-1 font-bold text-xl mb-4 relative">
                                        Lyrical Deconstruction
                                        <div class="absolute -bottom-1 left-0 w-full h-4 opacity-50">${marginDoodles.underline}</div>
                                    </div>
                                    <div class="space-y-6">${lyricsList}</div>
                                </div>
                                ${finalNoteHTML}
                                ${podcastHTML}
                            </div>
                        `;
                    }

                    let rightHTML = `
                        <div class="pl-4 flex flex-col relative z-10 min-h-full flex-grow pb-16">
                            <div class="flex justify-between items-start mb-6 flex-wrap gap-4">
                                <h3 class="font-title text-3xl text-gray-600 underline decoration-wavy decoration-red-400">Analysis Notes</h3>
                                <div class="flex flex-col items-end gap-2">
                                    <button class="btn-go-back-index font-red-pen text-lg border border-red-400 rounded-full px-4 py-1 hover:bg-red-50 transition-colors transform rotate-2 bg-white bg-opacity-50">← Back to Table of Contents</button>
                                    <button class="mobile-tab-btn-left mobile-tab-btn font-red-pen text-lg border border-red-400 rounded-full px-4 py-1 hover:bg-red-50 transition-colors transform -rotate-1 bg-white bg-opacity-50">👈 Back to Poem</button>
                                </div>
                            </div>
                            <div class="space-y-6 flex-grow pb-8 relative z-10">
                                ${breakdownHTML}
                            </div>
                            ${randomDoodlesHTML}
                            <div class="mt-auto w-full text-right font-pencil text-gray-500 pointer-events-none pt-4 pb-4">Pg. ${index * 2}</div>
                        </div>
                    `;

                    if (leftTarget) leftTarget.innerHTML = leftHTML;
                    if (rightTarget) rightTarget.innerHTML = rightHTML;
                }
            },

            renderSpread() {
                this.dom.btnPrev.disabled = this.state.currentSpread === 0 && this.state.mobileTab === 'left';
                this.dom.btnPrev.style.opacity = this.dom.btnPrev.disabled ? "0.5" : "1";
                this.dom.btnNext.disabled = this.state.currentSpread === initialBookData.length - 1 && this.state.mobileTab === 'right';
                this.dom.btnNext.style.opacity = this.dom.btnNext.disabled ? "0.5" : "1";

                this.dom.pageLeft.className = `notebook-page page-left w-full md:w-1/2 relative z-20 ${this.state.mobileTab === 'right' ? 'hide-on-mobile' : ''}`;
                this.dom.pageRight.className = `notebook-page page-right w-full md:w-1/2 relative z-20 ${this.state.mobileTab === 'left' ? 'hide-on-mobile' : ''}`;

                this.renderPageData(this.state.currentSpread, this.dom.contentLeft, this.dom.contentRight, false);

                this.dom.pageLeft.scrollTop = 0;
                this.dom.pageRight.scrollTop = 0;
            }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());

    </script>
</body>
</html>
