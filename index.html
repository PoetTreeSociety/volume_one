            { id: 1, title: "Life of Chi", poem: "She tells stories just to hide the pain, Makes believe that every dream, no matter if wet or clean, is all the same. Her hair is weaved, but she sewed her seams together, And so it seems that she only hopes that things will get better. She wants to bling, but is broke, So the only rings she sees are Saturn’s, And stars from being reamed and choked for being combative. It's hard to leave, though she copes with the reality of her dreams being shattered. A battered teen that no one sees,\n\nEloped or being in a marriage, The average scene is what leaves her broken, And feeling so embarrassed. The medicine was dope, And though it was advised by both of her parents, They died when she was 19. So it seems to be so apparent that this feeling left her alive and free, Though it didn't provide any relief for the damage that she sustained, Within her extremities, when she lay on her back while he managed to plant his seed so deep inside. The fact that she managed to be alive is a dream,\n\nEspecially the way he killed her insides. It's kind of odd that she would survive all of this anguish. But would you believe that all of this was a lie, in an attempt to be famous? So you see, the collage in which all of these scenes had been painted Was merely a mirage to hide the fact that she fell, And now she feels that her gift has been tainted. Her parents are alive and well. See, the only thing that died was their marriage, While the drugs were the birth control pills that were prescribed to avoid an extra carriage.\n\nNow let's compare it side by side, And you tell me which one is more compelling. Then I will let you decide how you’d like to retell it. This is the true art of storytelling.", doodle: svgs.poem6, breakdown: { inspiration: "An exploration of trauma fabrication—how society commodifies tragic backstories, making people invent pain just to be heard.", themes: ["Fabricated Reality", "The Cost of Fame", "Commodifying Trauma", "The Art of Storytelling"], lyrics: [{ quote: "wet or clean, is all the same", note: "Blurring the emotional lines between pleasant dreams and nightmares." }, { quote: "sewed her seams together", note: "Using the physical act of sewing a hair weave as a metaphor for barely holding a fragile life intact." }, { quote: "only rings she sees are Saturn’s", note: "Cosmic imagery used to describe the physical reality and disorientation of domestic abuse." }, { quote: "plant his seed so deep inside", note: "Describing the visceral invasion of abuse, leaving a lasting, damaging psychological legacy." }, { quote: "birth control pills that were prescribed to avoid an extra carriage", note: "A dark double entendre: avoiding a baby carriage and dodging extra emotional baggage." }, { quote: "all of this was a lie... true art of storytelling", note: "The meta-twist. It questions the reader's appetite for tragedy. Why do we only listen when it hurts?" }], finalNote: "An incredibly sharp commentary on society's twisted appetite for suffering as entertainment." }, podcastUrl: "https://www.dropbox.com/scl/fi/jejqg5va1mdcaj38en2vt/HowLifeofChiWeaponizesYourEmpathy.m4a?rlkey=ddzu8xprrxuqfx6nidqc4ixqp&st=1852zfz0&raw=1" },
            { id: 2, title: "Missed Conception", poem: "I started doing drugs way before I was an infant. I was addicted, though not my intention, I became accustomed to how the smoke Lifted from out of the holes of my nose, As it rose slow as an incense. It left an imprint that remained so close within, Not to mention the nightmares of myself, And the pain that I felt thinking about What I was supposed to have been. But see, I don't blame myself. Only the one who's supposed to have been Focusing on me instead of herself,\n\nTell me, was that fix worth the 10 You spent getting us high on dope again? See, my eyes are slowly opening, Though it is still hard for me to see, Because of all the smoke that was toking in, Which is making the oxygen ultra-thin And harder for me to breathe. I wish that I were born again, Or at least already conceived, So I can escape this tomb of a womb And let my mind ascend high enough Where I can be free. My life has been rough, And I'm only five months old.\n\nI can wait to see what shape that I'll be in After the whole nine months are over And the blinds unfold. I'm trying to hold on to this life, But it's hard to endure with day in and night out Of punishment and abuse with no say so, While my mom is steadily getting strung out on the floor, Though I am grateful for my conception, I know it must be more, to life, besides destroying your body, which is wasteful. Sometimes I wonder what else is in store. But today is the day I take a stand\n\nAnd say I can can't take it no more, As I planned my great escape. I grabbed hold of this object, but it broke, And suddenly water began to pour. You may not understand my logic. But see, I was getting ready to explore A world just like I dreamt it, Where my spirit can soar, Where my soul would be uplifted from off of this tomb's floor And delight in the sight of my father's presence forevermore. See, Ma, I was like your present That was bought and wrapped from the store,\n\nBut like the Grinch, you came and snatched it away. You took my life for the price What some would pay to adore. But that's okay, you see, I'm about to settle the score And take away the last bit of life I had left, Wrapping the umbilical cord around my neck, I say with my last breath, Mommy, I love you, despite all the things you do. I just hope one day you realize You truly had something special...\n\nGrowing inside of you.", doodle: svgs.poem7, breakdown: { inspiration: "Written from the chilling perspective of an unborn child suffering from maternal drug abuse, making the ultimate tragic choice.", themes: ["Unborn Perspective", "Addiction's Collateral Damage", "Tragic Autonomy", "Unconditional Love"], lyrics: [{ quote: "addicted, though not my intention", note: "Highlights the absolute lack of agency a child has in inheriting their parent's chemical vices." }, { quote: "smoke Lifted from out of the holes", note: "The visceral reality of the womb filling with the byproduct of the mother's addiction." }, { quote: "rose slow as an incense", note: "A perversion of a holy, prayerful image replaced by the toxic smoke of a drug habit." }, { quote: "nightmares of myself", note: "The unborn child is already haunted by the damaged potential of who they might become." }, { quote: "tomb of a womb", note: "A haunting internal rhyme showing how the safest place in nature has become a death trap." }, { quote: "five months old... blinds unfold", note: "Anticipating birth as the drawing of blinds, waiting for the light to finally hit their eyes." }, { quote: "like your present That was bought and wrapped", note: "Emphasizing the child's inherent value as a gift that was carelessly discarded." }, { quote: "like the Grinch", note: "Comparing the theft of the child's life and joy to the stealing of a celebrated gift." }, { quote: "Wrapping the umbilical cord around my neck", note: "The darkest escape. Turning the biological lifeline into an instrument of autonomy and sacrifice." }], finalNote: "Gut-wrenching perspective. The twist of using the umbilical cord is incredibly dark but poetically flawless." }, podcastUrl: "https://www.dropbox.com/scl/fi/1vqoy48t2y9sbxom5gakx/TheVoiceofanUnborn_Addict.m4a?rlkey=zi9535uqcoy5krp65januxrvs&st=ndeyihsr&raw=1" },
            { id: 3, title: "The Pain of a Child through the Eyes of a Man", poem: "You think, since I'm a child, I'm not supposed to hurt or cry, but only smile, though my eyes are open wide, I see and hear only what you allow, because deep down inside I'm lonely, and my tears flow down like creeks that leak into denial, rivers of emotions that increase with every mile. When you tell me to go to sleep, I feel like I'm being sentenced to death because I can't speak when you guys are arguing. So I weep after the trial.\n\nHow can you tell me to do as you say, and not as you do, when I see My father creep into the house after hours and watch my mother jump out of cars that ain't ours. You both were supposed to stand tall like Twin Towers, but somehow you choked and fell under the spell of Sin's powers. Since I was born, you said I brought joy like the sun do flowers, and that I was your baby boy, so as the son, you showered me with love and support, though suddenly it changed from sunny to Sun showers.\n\nThen came the rain and storms of pain, which caused my family to be salty like seeds from sunflowers. As I write this plea, the ink bleeds on the page like jeans on some collars, and the pain runs deep as the blue lines become the veins that are inside my flesh that you see when I open my heart and soul and express my feelings like young scholars. God, I'm stressed, and what I'm dealing with is becoming too much for one to swallow. I feel like I'm in the wilderness because this emptiness in my heart is causing my soul to be hollow. I know it's impossible for anyone to lead if none follow. So I hope you hear this decree and reunite my family so I can be free and able to reach 13 like Apollo. Never mind. I hear screams, so I guess I'll try to fall asleep and see if I have a chance to dream tomorrow.", doodle: svgs.poem1, breakdown: { inspiration: "Observing the silent trauma children endure when trapped in the crossfire of domestic disputes and infidelity.", themes: ["Loss of Innocence", "Hypocrisy in Parenting", "Emotional Suffocation", "The Weight of Observation"], lyrics: [{ quote: "creeks that leak into denial", note: "A clever homophonic wordplay on the famous river 'The Nile', highlighting how deep and vast the family's denial goes." }, { quote: "jump out of cars that ain't ours", note: "Captures the visceral confusion of a child witnessing a parent's infidelity and secretive behavior." }, { quote: "tall like Twin Towers... under the spell of Sin's powers", note: "Comparing the collapse of the family unit to a catastrophic, world-altering disaster." }, { quote: "sunny to Sun showers...", note: "A brilliant double entendre playing on 'son' and 'sun', shifting from warmth to crying/grief." }, { quote: "blue lines become the veins...", note: "Meta-reference to the very notebook paper this is written on; the poem is his literal lifeblood." }, { quote: "wilderness because this emptiness in my heart", note: "Contrasting the crowded nature of a turbulent household with the profound, barren isolation the child feels inside." }, { quote: "reach 13 like Apollo", note: "A clever reference to the Apollo 13 space mission—hoping to survive a disastrous situation and just make it home safely." }], finalNote: "A heavy, poignant exploration of how adult actions violently shape a child's internal world." }, podcastUrl: "https://www.dropbox.com/scl/fi/b5frwx1x60h8zdc28rqee/TheTraumaBehindtheOld_Soul.m4a?rlkey=86l35o93i5h90a1iujlcf4pbz&st=r6h2j748&raw=1" },
            { id: 4, title: "Window Pain", poem: "Looking outside of my window, I've seen many things leave that once were attached to trees, And as soon as the wind blows, They up and go with ease, But their presence is still felt Just like a gentle breeze against my skin. I'm trying to find peace from within, Though it's kind of hard to say how I feel, So I just speak through my pen And let my thoughts reveal the world looking through my eyes, So you can see what I'm saying And not be surprised. Without further delaying,\n\nLet's take a ride into the inside of my mind Where it won't cost you a dime, Because the only price that you would pay Is if you decide to stay In this life of crime, despite the sunshine, It’s really raining outside, Water falling from a mother's eyes, Kneeling down as she cries, Asking the Lord why her daughter had to die. But if you look a little closer, You will see why, the needle was still in her arm. I'm shaking my head as I looked on, Trying not to cry, I read a couple books of Psalms.\n\nOftentimes, I deny if this place is really where I'm from, Or maybe it's a dream, And all the hookers and bums are really kings and queens. That means I'm next in line To find my princess. But once reality sets in my mind, I realize that it's senseless. After a few pinches, I'm back, looking through my window pane. In the back, there's a robbery taking place With nothing to lose and everything to gain. He'll probably take the cash And forget about the safe. But one mistake can cost him his life.\n\nHe made two, which doesn't make any sense, And now the cops have him trapped Like a fence. He's through. I bet now he's wishing he should have thought twice. This is the type of life outside of my window, Whether wrong or right, You'll still get harassed because of your skin tone. We didn't ask to be poor Or prone to poverty. The reasons are unknown. Sometimes I try to ignore, But these questions inside my head still bother me. See, the farther I look, I see that this is the only life that I know,\n\nFilled with drug-infested streets. This can't be the life that I chose, Or could it be? Who knows, we'll see in due time. So until that day comes And the cock crows,\n\nI'll just close my blinds\nAnd wait for a brighter day to open my mind.", doodle: svgs.poem5, breakdown: { inspiration: "The feeling of being a helpless observer to the tragedy and systemic decay of one's own neighborhood.", themes: ["Urban Decay", "Observation vs. Action", "Escapism", "The Cycle of Poverty"], lyrics: [{ quote: "Window Pain", note: "The title itself is a homophone: a physical window pane vs. the emotional pain seen through it." }, { quote: "attached to trees / up and go with ease", note: "Comparing the sudden loss of friends to autumn leaves effortlessly blowing away in the wind." }, { quote: "cost you a dime / despite the sunshine", note: "The irony that the mind is free to explore, while the physical reality outside is sunny yet deeply tragic." }, { quote: "water falling from a mother's eyes", note: "Replacing physical rain with the tears of grief, setting a somber tone." }, { quote: "the needle was still in her arm", note: "A stark, devastating image that violently interrupts the mother's hopeful religious prayers." }, { quote: "hookers and bums are really kings and queens", note: "A psychological coping mechanism; trying to find royalty and dignity in a degraded environment." }, { quote: "trapped Like a fence", note: "The inevitable conclusion for those who try to take shortcuts out of the poverty trap." }, { quote: "harassed because of your skin tone", note: "A blunt transition from poetic metaphor to the stark, unavoidable reality of systemic racism." }, { quote: "And the cock crows", note: "A brilliant biblical reference to Peter's denial, signifying the repeated betrayal of the community by society." }], finalNote: "A cinematic sweep of the neighborhood. You made the reader look through your exact lens." }, podcastUrl: "https://www.dropbox.com/scl/fi/suqpzu9bebiu8h6bpitnr/TheheavytollofWindow_Pain.m4a?rlkey=995o65wtukm3zww8ku0m2d6w8&st=8liuqlt4&raw=1" },
            { id: 5, title: "Strange Fruits", poem: "I started running as fast as I can. I ran because Master was coming, but see, I was cunning and decided to run faster by letting my mind expand through pastures. I ran, trying to reach foreign lands, but was running out of time. How can I run in sinking sands when life has her stinking hands, from one end of my life span all the way to the last strand. You see, time is running thin, and yet we run to cop a Benz but won't chase after our dreams. It's funny that we only run after money\n\njust to see how fast we could spend. We're running out like ink from pens and pretend we run the streets because we beef with men who don't have any sneaks, and they run on bare feet so the beef contin-ues until he wins, because his peeps don't see defeat of a dude with 10 shoes. We run for weeks like cycles of menstruals, until we get caught up and caught by men who catch us slipping when carrying heavy weight, trying to draw a figure with no utensils. Though some try to escape, but can't catch a break\n\nand grab hold to a better opportunity, because they get caught on tape and catch a case. So our kids embrace what we get caught up with out here in these ghetto communities. The continuity of drug supply in the hood makes it easy to get strung out on dope. But if you know the ropes and don't promote this type of life, You'll be able to stand up and fight and not just lean against the ropes. See, back in the day, as slaves, they demeaned us and put ropes around our heads as a form of binding. Now we dip them in platinum and gold and put those same ropes around our necks. So now we think that were shining, though it's only reminding us that history is rewinding. They give us enough rope until we hang ourselves, and just 'cause we excel, it doesn't mean that we're climbing.\n\nSee, a lot of us are steady falling and stay in confinement. We think that we're balling 'cause we shoot the shots that go in-side of our skins, but won't shoot for the stars and live above the rims. So we stay riding the pine until we ride in the pine box. Could someone tell me when will this crime stop? My mind stopped to look, and there's the tree, but not the tree of life, but rather death. Trees, I thought, were supposed to promote life, instead of taking its breath.\n\nWe light trees and call it weed, and indulge in more leaves. The stims give us support to hang from our limbs. You can say we are like the trees. The water was the sea, the sun being our sons and daughters, We grew strong to each trial, though all the tears that fell from being in de-nile became the leaves. The branches are our arms and feet, and when we die, our thoughts will be the seeds. We went from getting hung ourselves to now hanging Jesus on our necks.\n\nHe hung his head for us on that tree when he died for our sins, when our souls were hanging in the balance of death. So now we hang and roll with thugs that promote violence all day on the block, where the street code for a G is silence and mean mugs never to convey with the cops. We hang our heads high when we slang drugs in the form of YAY or rocks and hang all night in strip clubs, letting our jeans hang below our socks.\n\nWe need to stop and hang our thoughts out to dry, because we've been brainwashed by all the things that we watch, thinking it's cool if we hang out and have hangovers the next day because we parlayed with someone famous. Wait, don't hang up, just hear what I'm saying. I too, hung with killers and drug dealers back in the day and watched the mothers of my brothers crying and praying, hanging their heads low over their sons in the grave, and now they're dead, and the guilt hangs over the head of the fathers who wasn't there because he didn't bother but it was left up to the street scholars to raise them instead.\n\nIt's like a horror- movie because it seems like we're dying the fastest. We kill each other over bread, trying to cop as much dough, but don't know how to make it grow, because we like the info from our home economics classes.\n\nThey said we better off dead because our fathers are never home, so our kids are labeled as bastards and left alone for dead. The streets are a beast, and they prey on young thoroughbreds, using tactics to show their teeth when they sink into the pockets of teens while killing their dreams and sending them back to these same old ghetto sheds... in the trap. But what we need to do is start saving our people and not just leave them for dead. People kill me when they say they're too busy\n\nor don't have the time to lend a hand, but if there was a concert performed by Young Jeezy, you'd be the first to spend your time and your money just to be labeled a supporting fan. So why can we support each other, those who are able, and help your fellow man instead of killing each other, like Cain did Abel with guns and drugs like heroin? We just need to invest more time and love like those at Merrill Lynch, And so ever since I started letting my mind run, I've been running ever since,\n\nhoping to never become negligent to what I could become if I were to ever get caught up in this world and be the next one hung, but I prefer the term…Lynched!", doodle: svgs.poem10, breakdown: { inspiration: "Drawing a direct, painful line between historical slavery/lynchings (the Billie Holiday reference) and modern systemic oppression and black-on-black violence.", themes: ["Historical Trauma", "Misplaced Priorities", "Systemic Traps", "Community Responsibility"], lyrics: [{ quote: "run to cop a Benz but won't chase after our dreams", note: "The tragic shift from physical running (escaping slavery) to metaphorical running (chasing capitalism)." }, { quote: "cycles of menstruals", note: "A raw, visceral metaphor for the recurring cycles of violence and the continuous shedding of blood." }, { quote: "dip them in platinum and gold and put those same ropes around our necks", note: "A striking metaphor. The literal ropes of historical lynching have evolved into the heavy, material chains (jewelry) of modern consumerism." }, { quote: "being in de-nile became the leaves", note: "Brilliant double-entendre. 'Denial' as a psychological state, and 'The Nile' referring back to African roots and the water nourishing the metaphorical tree." }, { quote: "hang our thoughts out to dry... hangovers... parlayed", note: "An impressive sequence of wordplay exploring every contextual variation of the word 'hang' in modern vernacular." }, { quote: "Cain did Abel", note: "A biblical reference highlighting the tragedy of black-on-black violence as the ultimate fratricide." }, { quote: "the next one hung, but I prefer the term…Lynched!", note: "Connecting the modern 'trap' directly to historical murders, redefining modern tragedy." }], finalNote: "A powerful synthesis of past and present struggles. The extended metaphor of the 'tree' and the repeated play on 'hanging' is absolute genius." }, podcastUrl: "https://www.dropbox.com/scl/fi/qfr86fwpnevyclhmacljz/Turninglynchingropesintogold_chains.m4a?rlkey=ve7fg4u54ny0tvy4h0s9c3qvk&st=f99ir68v&raw=1" },
            { id: 6, title: "School Daze", poem: "I'm up in the classroom trying to keep my eyes open, but the teacher is talking us to death. I feel like my mind is choking. The only way I can escape this torture is if I find some sleep as quick as I can. So there is no time to count sheep. It seems like two seconds that I had my eyes closed. The next thing you know, my cell phone rings, but I think no one knows. So I answered the phone, wondering who it could be, calling this time of day? It must be an emergency.\n\nIt was my man, Stan. He told me he had a plan on how we could get back at those dudes who shot at us and ran. I said, you know me, I am down for whatever. He said, Cool. Well, let me get the rest of the crew together. I was like, Yo, let me hit you back when the class is done. He was like, \" Alright, peace out my niggha one! So the rest of the class period, I'm wondering what he had in mind, hoping his plan was legit and not just a waste of my time. The class has finally come to a close.\n\nI'm still thinking about Stan and his plan that nobody knows. So when I got to his crib, it was like four o'clock on a dot. There was a note in front of the house saying, go around back where the door was unlocked. To my surprise, when I went inside, Stan wasn't there, just five other guys who I blasted on in the town square. Yeah, we had beef, but I thought we squashed it. We even had dirt under the nails, but I thought that we had washed it. Now, you know, we couldn't let you off like that.\n\nWe even used your man to make a plan to help us get you back. Now, any last request before you be a teardrop. You wore your heart on your sleeve instead of your chest. So this is when the fear stops. Then Stan appeared with a sick smile and looked me in the eyes, then told me everything he had ever said to me were all lies. I said, How could you do this? I thought we were cool, but I guess not, because you betrayed me and played me like a fool. It's amazing what some people would do for respect,\n\neven take the life of another person and feel no regret. Yo, enough said, bro, it's time to meet your Maker. So I closed my eyes. He shot. Then a voice said, “Wake up. Wake up. Shawn, wake up. I jumped up and started touching my body like I was crazy. My classmates started pointing and laughing, but that didn't faze me. I sat back down, thinking whether this was a vision or a dream. It's too hard to tell. Though these feelings felt real, it seems, man, this whole situation has got my mind blown.\n\nBut then, suddenly, I heard a ring\nand Stan's number appear on my cell phone.", doodle: svgs.poem11, breakdown: { inspiration: "The terrifying overlap of street violence paranoia seeping into the mundane reality of a high school classroom.", themes: ["Paranoia", "Betrayal", "Street Violence vs. Education", "Dream States"], lyrics: [{ quote: "mind is choking", note: "The suffocating environment of the traditional classroom, feeling entirely disconnected from his reality." }, { quote: "time to count sheep", note: "The desperate need for an immediate escape mechanism from the torturous boredom." }, { quote: "dirt under the nails", note: "A metaphor for attempting to leave street beefs in the past; blood and grudges don't wash off easily." }, { quote: "wore your heart on your sleeve instead of your chest", note: "Criticizing vulnerability. In this environment, showing emotion or trust is seen as a fatal weakness." }, { quote: "be a teardrop", note: "Referencing teardrop tattoos, meaning someone's death is about to be marked on someone's face." }, { quote: "played me like a fool", note: "The ultimate betrayal. The streets use the people you trust to set the trap." }, { quote: "meet your Maker", note: "The ultimate, violent transition from the nightmare's consequence back to the waking reality." }, { quote: "Wake up. Shawn, wake up.", note: "The harsh snap back to reality. The classroom sleep was the true escape, the dream was the nightmare." }, { quote: "got my mind blown", note: "A double meaning—literally getting shot in the head in the dream, and psychologically stunned in reality." }], finalNote: "The pacing mimics a thriller. The blurred lines between waking trauma and sleeping trauma are brilliantly executed." }, podcastUrl: "https://www.dropbox.com/scl/fi/wbw21vd9qielqh5h07c8d/LethalBetrayalinThirdPeriod_Math.m4a?rlkey=vur7ghals4htt2mlh89fr2jvg&st=hioyplbm&raw=1" },
            { id: 7, title: "Victoria Secret", poem: "The sign in her mind, it read open. So I just invited myself in, hoping That she would have some time to review My lines of words spoken, because I heard That she was now hiring men. See, my thoughts are perspiring because I'm nervous, And now the sweat of ink is starting to fall from my pen My purpose was only inquiring About a position that was left open By her father when she was around nine or ten. So my intent wasn't to bother or purchase Any of her condiments, because her beauty\n\nLeft my food for thoughts with enough flavor To savor the scent, the confidence to save her, I nearly lost it when I started to think What the players would vent, seeing me with Someone whose clothes were always half off, Or posing in underwear, unaware of the intent, Though some would stare, because to them, It didn't make any sense. While they were paying with cash, I was giving my last of attention, Though she didn't grasp because it didn't add To make enough cents, she was content\n\nWith what she had, because in the past, Her dad would try to make a pass or throw Sexual hints. So Victoria's Secret wasnt that She was fast, but the fact that she had been harassed By men ever since she was a decimal cent. A celestial sent to cross my path, Not just to flash her merchandise or tab The money I spent, but to surpass the idea Of what she thought was suffice and grab life At a price that would tag a major event. You can say she was lament, 'Cause at times she would let them in past the hours of Letterman, working the graveyard shift, As they would lay the pipes, while she would lay there stiff Like cement. Too busy burying herself in shame, Her pain runs deeper than sediments, Which explains why she was wholesale, because There was no wealth; she's been through so much hell, You couldn't tell that she was heaven-sent. So the only thing that was on sale was her soul, Along with old measurements that she bargained At times that could have thrown her in jail,\n\nBut she just had to make a sale, so her boss Wouldn't yell or threaten to close her establishment. So, sexual harassment never arose, Even though it was evident, the embarrassment of taking off one's clothes on poles only shows Her negligence. Though she's a veteran, Victoria was more than a, employee of the month. But she would employ just for euphoria, In order for them to come and support her three daughters, couldn't afford a school lunch, And oftentimes would panhandle like Florida,\n\nBut wasn't poor enough to succumb. I started to become annoyed with her, Thinking, how could she be so dumb, Letting these customers come into the store with the intent to buy her love, thinking that's all She needs, but all she sees are just ones, Though what she needs is someone to show her How to truly manage her store, without managing, to ignore The damaging decor that was done By those who were handling her poor, when she was young, Running wild and scrambling to explore life.\n\nThough Jesus Christ is standing in the door, Waiting for her to employ him, a file that was Handed in before, but somehow rejected And now neglected a person who was once Considered eclectic. But because of her foul ways, she is no longer respected. As I sit here reflecting, thinking of ways To be more of a witness to my sister, I was shocked when I heard the message That the real Victoria's Secret was that her real name was... Victor!", doodle: svgs.poem3, breakdown: { inspiration: "A narrative deconstruction of exploitation, masked by the glamour of a well-known brand name, culminating in a powerful twist of identity.", themes: ["Childhood Trauma", "Commodifying the Body", "Misplaced Worth", "Hidden Identity"], lyrics: [{ quote: "sweat of ink is starting to fall", note: "Personifying the act of writing as a nervous, perspiring suitor approaching someone beautiful." }, { quote: "paying with cash... giving my last of attention... make enough cents", note: "Masterful financial wordplay contrasting monetary value with emotional currency." }, { quote: "employee of the month... employ just for euphoria", note: "Critiquing how she is rewarded for commodifying her body, using it to buy temporary happiness or numb the pain." }, { quote: "panhandle like Florida", note: "A sharp geographical pun referencing the shape of Florida to describe begging for survival." }, { quote: "manage her store... ignore The damaging decor", note: "A brilliant metaphor equating the physical damage to her body/reputation with the interior design of a neglected storefront." }, { quote: "her real name was... Victor!", note: "The plot twist! Challenges assumptions about gender, survival, and the facades people build." }], finalNote: "A masterclass in misdirection. The ending forces the reader to re-evaluate the entire poem." }, podcastUrl: "https://www.dropbox.com/scl/fi/3a62432xr9qpbiq7u9zp0/TheRealVictorBehindVictoriasSecret.m4a?rlkey=ama4itu6gja89j7eokwyi6tkc&st=o3xc9lil&raw=1" },
            { id: 8, title: "The Cure", poem: "I was born in a cell in an area underneath the rails of the government. They never knew, out of a test tube, that I would excel into an entity That would leave a stain on the face of America that would be so permanent. The pain I would cause deliberately was just to see a firm percent of the African race slow up his speed so we could earn descents. What a turn of events, because once I was old enough to breathe, I turned to men and started infecting them with my beliefs. Homosexuality was big in the West, so my father sent me to see,\n\nIf I would be able to pass the test and connect with the human beings. I didn't know what to expect. I felt naked because I didn't have any genes, So the first home that wasn't protected, I found a pair that would fit, And that's how I got on the scenes. Those of whom I connected with were thought to be sick, Unaware of my schemes. So society neglected my existence until I started to afflict and went mainstream. For instance, the main thing I would get was injections into cells and tissues.\n\nInfections came through unprotected erections from gay males and tales of drug misuse. I hit hard and dug deep into the skins of people, like the hands of a masseuse. But instead of soothing, I would bruise the glands that immune together tight like strands of glue. My deficiency is efficient, you see, because I do more than just abuse. Instantly, I will run through your infantry and destroy the soldiers that were fighting for you. My blood is colder at of which I choose. They got me trapped in the system, and now I'm all over the news. In fact, they're trying to design a grid to label me with an acronym, undermining my tools. You see, what happened is, I am no longer a secret cause I managed to become full-blown. I'm constantly being attacked by activists and preachers trying to damage my kingdom and throw rocks at the throne. Can you believe them? But it's going to take a lot more than wrap-it-up ads and picket signs for me to leave them.\n\nBesides, it was the government that created me inside the labs of their wicked minds. I know it's a big slab, so try to let these words digest While I do the math inside your mind, that'll strike a nerve in your flesh. In the U.S., by the time 24 hours would end, I would have blessed 15,000 people by way of sex or needles Who would die just from the thought of me being inside of their skin. Why contest? I mean, you've never seen such a force within. 17 million have already died in Africa, and I have affected at least another 10.\n\nI laugh at ya because you're not ignorant, that's the act of not knowing, But since y'all know and still don't respect me, your thoughts are lethargic. It's like trying to go up creek without rowing. See, my target is for everyone to be affected by me, regardless of age or who you are; If you're not strapped up when I come with my team, Your life will be taken away as soon as I penetrate and infiltrate this deadly disease.\nWho am I? Well, they call me the cure.", doodle: svgs.poem9, breakdown: { inspiration: "A chilling first-person narrative from the perspective of the HIV/AIDS virus, exploring conspiracy theories and brutal realities.", themes: ["Personified Disease", "Government Conspiracy", "Societal Apathy", "Lethal Efficiency"], lyrics: [{ quote: "underneath the rails of the government", note: "Leans into the conspiracy theory that the virus was a man-made weapon created in secret labs." }, { quote: "stain on the face of America", note: "Acknowledging the epidemic's devastating, permanent cultural and historical impact." }, { quote: "earn descents", note: "A chilling motive. The virus aims to forcibly regress the progress of specific communities." }, { quote: "didnt have any genes", note: "A clever biological pun. It needs to hijack host DNA/genes to survive, similar to putting on jeans." }, { quote: "injections into cells and tissues", note: "Describing the literal biological mechanism of a virus invading a host body." }, { quote: "strands of glue", note: "A microscopic metaphor for the virus actively attacking the bonds that hold the immune system together." }, { quote: "My deficiency is efficient", note: "Brilliant wordplay on 'Immunodeficiency'—the virus boasting about its destructive perfection." }, { quote: "label me with an acronym", note: "A direct reference to HIV/AIDS without explicitly saying the words, forcing the reader to deduce the villain." }, { quote: "wrap-it-up ads and picket signs", note: "Mocking the superficial and inadequate societal responses to a deeply entrenched plague." }], finalNote: "Writing from the perspective of the virus is a haunting, highly effective literary device." }, podcastUrl: "https://www.dropbox.com/scl/fi/nvxiic6qangy5s6qy4pv5/Avirusthatcallsitselfthecure.m4a?rlkey=66zuo87mcevx1j8ca6bwxizao&st=m1gb92eu&raw=1" },
            { id: 9, title: "Rappers Delight", poem: "I'm your favorite rapper's favorite rapper. Success is what I rap for. Then, after the set, I jet to betray another actor. I'm wrapped up. What can I say? I get paid to act nuts and parlay the whole day not to remember the morning after. See, that's the way we were made, being slaves while the record execs are the masters. Getting away with lashing out checks, but denying us the rights to our Masters. Can barely write because I didn't master the eighth grade,\n\nbecause half the kids who were the same age were bastards. Only letters they knew were AKs and Ese’s who passed the grass, not the kind that we graze, the kind that we blazed after class, so high we can see space. What a disaster. Though I ask you, can you see days and days of this As a rapper, though, this is just half the play. There are more plays and chapters, more days and half months away, with no days for asthma. So say young scrapper, you made a rash de-cision, afraid thinking it was too great to pass up.\n\nNow you envision yourself on stage like a pastor, to your fans, you convey the days as a trap star. While enraged, a man who hates that you are a black star, begins to spray from the stands and aims at your black heart. Now, your fans demand that you relay like a track star an array of commands to retaliate until he's cast off. But I say, why wait until he's cast off when you can just lay him to the pave like he was asphalt. As for the pay, you may get what you asked for, a dime for every dollar made, though some say you may just need a task force to break into this game, and take the other half you didn't ask for. It's a shame, I know, but this type of fame is what you asked for. To be a puppet with no strings, a little change and groupies who hang and wait at the back door, screaming your name until they claim you took what you didn't ask for, so now youre in chains, afraid to look because stupid is what they last saw... And now this is your last song\n\n'cause the judge threw the book and the hook was: Was this really worth all the fame?", doodle: svgs.poem4, breakdown: { inspiration: "A critical look at the modern music industry, highlighting the exploitation of artists and the dangerous glorification of street life.", themes: ["Industry Exploitation", "The Illusion of Success", "Violence as Entertainment", "Modern Day Slavery"], lyrics: [{ quote: "favorite rapper's favorite rapper", note: "Opening with supreme arrogance, establishing the persona of an idolized figure who is secretly broken." }, { quote: "act nuts and parlay", note: "The facade of the rap lifestyle—paid to act out a destructive caricature of oneself." }, { quote: "denying us the rights to our Masters... didn't master the eighth grade", note: "Brilliant repetition of 'Master'. Connecting lack of education to modern-day industry subjugation." }, { quote: "AKs and Ese’s who passed the grass", note: "A dual-meaning wordplay contrasting 'Ese' (slang for friend) with 'Essays' (schoolwork they missed)." }, { quote: "black star / black heart", note: "Contrasting the celestial elevation of fame with the grim reality of street violence aimed at them." }, { quote: "relay like a track star... cast off", note: "Fans aggressively consume the artist's real-life danger and beefs as if it were a spectator sport." }, { quote: "a dime for every dollar made", note: "The harsh, mathematically precise reality of the 360-deal in the music business, exposing the illusion of wealth." }, { quote: "puppet with no strings", note: "The ultimate paradox of fame: the artist appears free and unbound, but is entirely controlled by the industry." }, { quote: "judge threw the book", note: "A tragic irony. They avoided books in school, only to have the ultimate book thrown at them in court." }], finalNote: "A devastating critique of the entertainment machine. The wordplay cuts right through the glamour." }, podcastUrl: "https://www.dropbox.com/scl/fi/7x6yc9z2b42e14slcprem/TheLethalTrapofRappers_Delight.m4a?rlkey=et12jhdvicvg3pux11bvykgs7&st=epf10s6j&raw=1" },
            { id: 10, title: "Love Music", poem: "I said, let's connect on a duet and call it: love music. Don't worry, I'll bring all the instruments we'll need for the set and then show you the proper way to use them. See, this musical will be as beautiful as a symphony, but don’t get it confused with just any unusual form of music. The melody just soothes your soul like a tube of Cool Whip, and with each hair string pulled, it releases a note and pens another verse through each movement. No need to rehearse because this poem is similar to a song, the way we beautifully write on each other's bodies with the pen being our tongues, but with my tongue, I begin to blend in with your heart's beat with some of my own sounds, which I strum from your eardrums.\n\nIt sounds so unique, the way I gently tap on its base. Then a tear comes, and I begin to play with your earlobes like tambourines, just to put a smile on your face. You have never seen or even heard of a song like this in the form of a poem, with the words being expressed through each kiss, though in French! As our bodies clash together, sort of like cymbals, the sound only expounds on the passion that we have for each other, which is a symbol of our affection. Like an erection, the hardness of this track is what allows me to lay you down on your back and rock your boat while my pen-is acting like a paintbrush, painting a beautiful silhouette. So you can, in fact, imagine how well I stroke. With each note being a little different, but yet the same, the session comes to an end.\n\nSo as my tenor voice moans through the background, your soprano tone blows louder than a trombone screaming out, \"Yes,” as I gently caress your turntables and whisper into your microphone, \"What's my name?” She came hard just like the rain, I guess to extinguish the flames from the heat of my sex beat thinking in my head It is a shame it must end this way, but then you whispered into my ear to say, “Same time next week.” But I smiled and said, “Why wait till next week when I can just turn you on your back and put this track on repeat.\"", doodle: svgs.poem8, breakdown: { inspiration: "An extended metaphor seamlessly blending the acts of musical composition, poetry writing, and physical intimacy.", themes: ["Sensuality", "Extended Metaphor", "Rhythm of Intimacy", "Art as Physicality"], lyrics: [{ quote: "tube of Cool Whip", note: "Evoking a sense of smoothness, sweetness, and sensory pleasure in the melody." }, { quote: "pen being our tongues", note: "Merging the intellectual act of spoken-word poetry with the physical act of kissing." }, { quote: "play with your earlobes like tambourines", note: "Incorporating and valuing every single part of the body as an essential instrument in the orchestra." }, { quote: "pen-is acting like a paintbrush", note: "A clever, highly intentional spacing/hyphenation wordplay that grounds the metaphor." }, { quote: "words being expressed through each kiss, though in French!", note: "A playful double meaning referencing French kissing as an international language of its own." }, { quote: "rock your boat", note: "A subtle nod to classic R&B lyrics, maintaining the musical theme while describing physical intimacy." }, { quote: "soprano tone blows louder than a trombone", note: "The climax of the physical connection represented as a powerful crescendo in the musical arrangement." }], finalNote: "The sustained musical metaphor creates a very rhythmic, sultry pacing for the reader." }, podcastUrl: "https://www.dropbox.com/scl/fi/u9hkay18h4ir9hixejoay/Themusicallanguageofphysical_desire.m4a?rlkey=dheve1qc3f0eeh8kfoui8ba41&st=pizupmdt&raw=1" },
            { id: 11, title: "Dear Winter", poem: "Dear winter, You know, this is around a time when I would begin to store away some food for thought in the back of my mind, but this time it ends up in the center, like a line that would properly align my poetic picture. So my agenda is to speak divine words from my mind just like a prophetic scripture. A synthetic mixture of feelings that were sublime and embedded began to feed my mind like a placenta, having my pen to give birth to my words like a paramedic with every line in the form of a rhyme that I entered.\n\nI’m not crying, I’m just hurt because it feels like my heart and soul have been injured because you blew your breath like a dart, and it struck a nerve that controlled a vital sensor. See, I tried to make sense of why this pain feels worse than influenza. I just took a few pills, but they don't work, because this curse still remains to reign king like the lion named Simba. I mean, someone should yell timber because I'm falling by the wayside, recalling all the good times that I remembered just staring in your gray eyes, similar to gray skies with tears of snow in the forecast. I don't know how long this season will last, but the fear of losing you is what makes me more sad. I spazz sometimes, and I cruise through your avenues paths just to see you iced out with lights that shine bright as igloos whenever the moon crashed.\n\nNot to excite myself or try to ignite old flames, I zoom past and go back home in shame, where I write tales of our life with me and you having a blast. See, in the past, we would have fights with you getting mad, and I’d get the cold shoulder. At times, I would laugh, but at nights, whenever I rolled over, I found myself alone, wrapped up tight, fearing the wrath of you, making my soul colder. I'm older, and yet you still treat me the same, ignoring my flesh because you’re vexed that my temperature changed. What you expect, I mean, you're part of the reason that caused it. I'm about to wreck any sec on this memory lane, if I don't park it, see you’re the blame for my last accident and the physical strain in my body, which left me car sick.\n\nNow I'm cautious yet still passionate, because I yearn for another kiss, but my love, I feel you're still passing it up like a turn cause whenever I try to talk, you just walk by in the form of a mist. I'm stuck, and I know I can't straddle the fence, so I have to decide which delegates me the most and won't keep my body feeling so tense. Well enough with the suspense, I've tried, but I'm just going to leave it in the hands of the man who owns us. And if it's meant, then it's meant; hope to see you again, outside, instead of just through these blinds if ever I recover from this pain of mine, called pneumonia.", doodle: svgs.poem2, breakdown: { inspiration: "A personification of both a season and a past lover, intertwining seasonal depression with the chill of a fading romance.", themes: ["Personification", "Emotional Coldness", "Nostalgia vs. Reality", "Cyclical Pain"], lyrics: [{ quote: "feed my mind like a placenta", note: "The toxic relationship paradoxically provides the lifeblood and nourishment for his art." }, { quote: "worse than influenza", note: "Grounding the emotional heartbreak in a physical, seasonal sickness." }, { quote: "lion named Simba / yell timber", note: "Connecting the reign of emotional pain to a falling tree; a total collapse of stability." }, { quote: "gray eyes, similar to gray skies", note: "Direct visual link between the lover's gaze and the bleakness of winter weather." }, { quote: "iced out with lights that shine bright as igloos", note: "A visual metaphor for the cold, dazzling, yet freezing nature of his memories of her." }, { quote: "write tales of our life... having a blast", note: "The agonizing warmth of nostalgia directly contrasting with the freezing, lonely reality of the present." }, { quote: "cold shoulder / soul colder", note: "A clever internal rhyme showing how her physical rejection leads to his spiritual freezing." }, { quote: "vexed that my temperature changed", note: "Growing cold emotionally; the relationship freezing over time, mirroring the season's peak." }, { quote: "passing it up like a turn", note: "A driving metaphor extending the feeling of being 'car sick' on memory lane." }], finalNote: "Brilliant use of extended metaphors. The chill of the season flawlessly mirrors the death of romance." }, podcastUrl: "https://www.dropbox.com/scl/fi/hs8z50oyxl21ggh37xtxl/Pneumoniadisguisedasatoxic_relationship.m4a?rlkey=25ygg35ydftqtqwb2ctoxze8c&st=zudprhyl&raw=1" },
            { id: 12, title: "Cruise Control", poem: "In an instance, my mind went back in time to the year of 1989, a little snotty-nosed five-year-old who was crying because my mom found out I was lying about getting dirt in my clothes. After she spanked me, my mom said, “You would thank me for this discipline,” but I wasn't trying to hear what she was saying because I was angry. Now I wish I would have listened then. Maybe it could have changed me, or at least the direction that I was going in, living in a world of sin. A hard head makes a soft bed\n\nof dirt where you will spend the rest of your days sleeping in. See, by the age of 10, I was already kicked out of three schools and walking a very thin line. I'm not trying to lose, but the pressure of being popular had me breaking the rules. Though God sees everything through His binoculars, and at times He forecasts like the news, I wish I would’ve taken heed to the warning signs that were in my path and didn't laugh just because I tried to be cool. The aftermath was that I was tried and sentenced\n\nto a juvenile detention center at the age of 15, accused of breaking into houses and shoplifting things, now in a place that was filled with youth offenders. But the truth is within us, if we choose to follow it. I wish I would’ve changed my direction in life instead of going down the same road that my father did. This is the life that I chose, and I gotta face it like a man, now 20 years old, with the fate of this other person's life in my hands. See, earlier that night, I had a few drinks that I thought I could stand.\n\nI didn't think before I got behind the wheel, and now were both about to be killed, me and the driver in the oncoming van. When you're facing death, your life flashes before your eyes, and you start to wish you could have done the right things in the past. Now, all I have left is my breath, hoping that I remain alive. See, after I came back to reality, everything was moving so fast, I only had a second to swerve and avoid hitting the vehicle in my path. So I did, jumping the curb, thinking,\n\n“Lord, I know you're not gonna let the kid take a journey that route.” But then, suddenly, there wasn't any land in front of me. I screamed for help as I saw nothing but water. I took a deep breath, and then I blacked out.", doodle: svgs.poem12, breakdown: { inspiration: "A frantic, life-flashing-before-the-eyes realization of poor life choices culminating in a catastrophic drunk driving accident.", themes: ["Regret", "Generational Curses", "Consequences", "The Final Moments"], lyrics: [{ quote: "soft bed of dirt", note: "A chilling foreshadowing of an early grave, resulting directly from the 'hard head' of youthful rebellion." }, { quote: "binoculars... forecasts like the news", note: "A metaphor for God's omniscience and warnings, which are repeatedly ignored by youthful arrogance." }, { quote: "juvenile detention center... youth offenders", note: "Tracking the tragic, systemic escalation from minor childhood rule-breaking to formal incarceration." }, { quote: "going down the same road that my father did", note: "Literal and figurative. He is driving down a physical road to destruction, mirroring his father's life path." }, { quote: "had a few drinks that I thought I could stand", note: "The fatal underestimation that turns a bad coping mechanism into a lethal weapon." }, { quote: "jumping the curb", note: "The violent, physical manifestation of finally losing total control over his life's trajectory." }, { quote: "nothing but water. I took a deep breath...", note: "A chilling, abrupt cliffhanger representing the moment of impact and impending drowning." }], finalNote: "The narrative structure mirroring a 'life flashing before your eyes' sequence builds incredible tension." }, podcastUrl: "https://www.dropbox.com/scl/fi/85n7v09v16xnha8kdefpl/Threesecondsoflifebefore_impact.m4a?rlkey=0f1soxcpikj5qp6rxtuohjwvl&st=54cf9lca&raw=1" },
            { id: 13, title: "Nic of Time", poem: "“Now you may enter”, is is what the Angel said, standing at the pearly gates. I rejoiced the whole way in, because I knew I had a blurry fate. The way my life was going. I didn't know how it would end Until I went to the altar and asked God to forgive me for all of my sins. It seems like only yesterday that I gave my life to Christ. I wish I could go back in time and rewind the events that happened after that night. Then the Angel appeared and said, \"You asked, and you shall receive.”\n\nSo let's go back in time to the day that you first believed.\" So in the blink of an eye, my body fell from the sky And traveled down through different galaxies. That exceeds the human eye. As I was going back down to earth, I saw a lot of different things, like planets in orbit And even the ones that had rings. When we finally broke through the Earth's atmosphere, Like in Revelation, it felt like hell because of the burning sensation. But my body was quickly cooled down by the wind in the air,\n\nWhich means we're almost to the ground, and so I wasn't scared. When we touched down, I found myself in a hospital On a surgical table with doctors in the middle. They had my face covered. I don't know why, But then they uncovered it, I guessed, to see if I was still alive. To revive me, they shocked me at least twice. Then my body started shaking, I guess Because my soul wasn't ready to give up my life. Then I noticed the doctors doing something strange. They started removing the stitches they had just inserted\n\nAnd started putting the bullets back inside the holes of my remains. Hey, what's going on? I'm being raced down this hall backwardly, passing the waiting room with my family, I barely got to see\n\nbut I was only able to get a quick glance, Then I found myself in the backseat of the ambulance. They put the car in reverse and sped off fast, While avoiding traffic lights and cars they would pass. I guess they were in a hurry to get me to the next hospital, One where I'll be better taken care of, and it costs little.\n\nThen suddenly, we stopped, and they placed me back on the pavement As if I were a tenant who got evicted for lack of paid rent. I slowly got up and started seeing bullets come out of my flesh. I'm standing there watching as my skin begins to close the holes in my chest. I then saw all the bullets go back into this gun, one by one, They all entered the barrel as if this job was done. Then there was this dude standing there pointing a gun in my face. My heart began pounding, so I had to stay in one place.\n\nThen we started fighting, but I found myself on the ground With him standing over, kicking me, trying to keep me down. When I finally got up, he punched me, but I hit him first, Because he was trying to take my money, it's funny because I just left church. I guess I wanted to get my mind clear Because I found myself back in service, standing in front of the pastor, Shaking like I was nervous. It looked like I just rededicated my life Because I asked God to forgive me and make everything right.\n\nI walked back to my seat and started crying like I was a baby, When I heard the pastor say, \"Jesus loves me, and he wants to save me.\"", doodle: svgs.poem13, breakdown: { inspiration: "A surreal, cinematic rewinding of time, showing how a single moment of spiritual surrender saved the author from a fatal shooting.", themes: ["Divine Intervention", "Rewinding Time", "Redemption", "Grace"], lyrics: [{ quote: "pearly gates... blurry fate", note: "Highlighting the extreme uncertainty of salvation right up until the final moment of reckoning." }, { quote: "planets in orbit And even the ones that had rings", note: "A cosmic perspective showing the vastness of God's creation as the soul makes its descent." }, { quote: "removing the stitches they had just inserted", note: "The literal, visually striking reversal of medical intervention as the timeline flows backwards." }, { quote: "evicted for lack of paid rent", note: "A clever simile comparing the physical body to a temporary dwelling that the soul is forced to return to." }, { quote: "bullets come out of my flesh... go back into this gun", note: "A vivid, rewinding of the violence, symbolizing that trauma and sin can literally be undone by grace." }, { quote: "funny because I just left church", note: "The irony that physical violence met him immediately after spiritual cleansing, but the spiritual act ultimately saved him." }, { quote: "Shaking like I was nervous", note: "The physical shock and reality of dodging death, crashing directly into the emotional release of finding salvation." }], finalNote: "A masterful use of backward-chronology. A beautiful end to Vol. 1." }, podcastUrl: "https://www.dropbox.com/scl/fi/nk8rzjwuzey8y8nltcdlt/Watchingyourownmurderin_reverse.m4a?rlkey=h8ojg1uh5lrcyj7inn45cnsrw&st=v6pawiqr&raw=1" },
            { id: 14, title: "Your Turn (Blank Page)", isInteractive: true, doodle: svgs.ai_magic }
        ];

        // --- APPLICATION LOGIC ---
        const App = {
            state: {
                currentSpread: 0,
                isBookOpened: false,
                mobileTab: 'left',
                userPoem: "",
                userBreakdown: null,
                recordings: {},
                isRecording: false,
                isUnlocked: false
            },
            
            mediaRecorder: null,
            audioChunks: [],

            dom: {
                bookCover: document.getElementById('book-cover'),
                bookInterior: document.getElementById('book-interior'),
                spreadContainer: document.getElementById('spread-container'),
                controls: document.getElementById('controls'),
                btnPrev: document.getElementById('btn-prev'),
                btnNext: document.getElementById('btn-next'),
                pageLeft: document.getElementById('page-left'),
                pageRight: document.getElementById('page-right'),
                contentLeft: document.getElementById('content-left'),
                contentRight: document.getElementById('content-right'),
                underlayLeft: document.getElementById('underlay-left'),
                underlayRight: document.getElementById('underlay-right'),
                underlayLeftContent: document.getElementById('underlay-left-content'),
                underlayRightContent: document.getElementById('underlay-right-content'),
                curlLeft: document.getElementById('curl-left'),
                curlRight: document.getElementById('curl-right'),
                passwordModal: document.getElementById('password-modal'),
                passwordInput: document.getElementById('password-input'),
                btnSubmitPwd: document.getElementById('btn-submit-pwd'),
                btnCancelPwd: document.getElementById('btn-cancel-pwd'),
                passwordError: document.getElementById('password-error'),
                videoModal: document.getElementById('video-modal'),
                introVideo: document.getElementById('intro-video'),
                btnSkipVideo: document.getElementById('btn-skip-video'),
                polaroidTrigger: document.getElementById('polaroid-trigger')
            },

            dragState: {
                isDragging: false,
                startX: 0,
                startY: 0,
                direction: 0,
                isAxisLocked: false
            },

            init() {
                // Password Modal Listeners
                this.dom.btnSubmitPwd.addEventListener('click', () => this.checkPassword());
                this.dom.btnCancelPwd.addEventListener('click', () => this.hidePasswordPrompt());
                this.dom.passwordInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.checkPassword();
                });

                // Video / Recorder Listeners
                this.dom.polaroidTrigger.addEventListener('click', () => this.playIntroVideo());
                this.dom.btnSkipVideo.addEventListener('click', () => this.closeVideo());
                this.dom.introVideo.addEventListener('ended', () => this.closeVideo());

                // Book Cover Click
                this.dom.bookCover.addEventListener('click', (e) => {
                    if (!this.state.isBookOpened) {
                        if (!this.state.isUnlocked) {
                            this.showPasswordPrompt();
                        } else {
                            this.openBook();
                        }
                    }
                });

                this.dom.btnPrev.addEventListener('click', () => this.navigate(-1));
                this.dom.btnNext.addEventListener('click', () => this.navigate(1));

                // Global event delegation
                document.addEventListener('click', (e) => {
                    const target = e.target;
                    if (target.closest('.interactive-link')) {
                        this.jumpToSpread(parseInt(target.closest('.interactive-link').dataset.id));
                    } else if (target.closest('#btn-toggle-record')) {
                        this.toggleRecording();
                    } else if (target.closest('.btn-delete-recording')) {
                        this.state.recordings[this.state.currentSpread] = null;
                        this.renderSpread();
                    } else if (target.closest('#btn-ai-grade')) {
                        this.handleAIGrade();
                    } else if (target.closest('.mobile-tab-btn-right')) {
                        this.setMobileTab('right');
                    } else if (target.closest('.mobile-tab-btn-left')) {
                        this.setMobileTab('left');
                    } else if (target.closest('.btn-go-back-index')) {
                        this.jumpToSpread(0);
                    }
                });

                // Capture user typing to enable the AI grading button and save the poem
                document.addEventListener('input', (e) => {
                    if (e.target.id === 'user-poem-input') {
                        this.state.userPoem = e.target.value;
                        const btn = document.getElementById('btn-ai-grade');
                        if (btn) {
                            const canSubmit = this.state.userPoem.trim().length > 0;
                            btn.disabled = !canSubmit;
                            if (canSubmit) {
                                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                                btn.classList.add('hover:bg-red-50', 'hover:scale-105', 'bg-white', 'bg-opacity-70', 'cursor-pointer');
                            } else {
                                btn.classList.add('opacity-50', 'cursor-not-allowed');
                                btn.classList.remove('hover:bg-red-50', 'hover:scale-105', 'bg-white', 'bg-opacity-70', 'cursor-pointer');
                            }
                        }
                    }
                });

                // --- Page Curl Drag Logic ---
                const startDrag = (e) => {
                    if (!this.state.isBookOpened) return;
                    const target = e.target;
                    if (target.closest('button') || target.closest('input') || target.closest('textarea') || target.closest('audio') || target.closest('.interactive-link') || target.closest('svg.w-24')) return;

                    this.dragState.isDragging = true;
                    this.dragState.startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    this.dragState.startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                    this.dragState.isAxisLocked = false;
                    
                    const rect = this.dom.spreadContainer.getBoundingClientRect();
                    const clickX = this.dragState.startX - rect.left;
                    
                    this.dom.spreadContainer.classList.remove('page-turn-forward', 'page-turn-backward');
                    document.body.style.userSelect = 'none'; 
                    
                    const isMobileView = window.innerWidth <= 768;

                    if (isMobileView) {
                         this.dragState.direction = 0; 
                    } else {
                        if (clickX > rect.width / 2 && this.state.currentSpread < initialBookData.length - 1) {
                            this.dragState.direction = 1;
                            this.dom.pageRight.style.transformOrigin = 'left center';
                            this.dom.pageRight.style.transition = 'none';
                            this.dom.curlRight.style.transition = 'none';
                            this.dom.pageRight.style.zIndex = '50';
                            this.dom.pageLeft.style.zIndex = '20';
                            
                            // Pre-render and show the upcoming right page underlay
                            this.dom.underlayRight.classList.remove('hidden');
                            this.renderPageData(this.state.currentSpread + 1, null, this.dom.underlayRightContent, true);
                        } else if (clickX <= rect.width / 2 && this.state.currentSpread > 0) {
                            this.dragState.direction = -1;
                            this.dom.pageLeft.style.transformOrigin = 'right center';
                            this.dom.pageLeft.style.transition = 'none';
                            this.dom.curlLeft.style.transition = 'none';
                            this.dom.pageLeft.style.zIndex = '50';
                            this.dom.pageRight.style.zIndex = '20';
                            
                            // Pre-render and show the previous left page underlay
                            this.dom.underlayLeft.classList.remove('hidden');
                            this.renderPageData(this.state.currentSpread - 1, this.dom.underlayLeftContent, null, true);
                        } else {
                            this.dragState.isDragging = false;
                            document.body.style.userSelect = '';
                        }
                    }
                };

                const doDrag = (e) => {
                    if (!this.dragState.isDragging) return;
                    
                    let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    let clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                    let rawDelta = this.dragState.startX - clientX;
                    let deltaY = this.dragState.startY - clientY;
                    const isMobileView = window.innerWidth <= 768;

                    if (!this.dragState.isAxisLocked) {
                        if (Math.abs(deltaY) > Math.abs(rawDelta)) {
                            this.dragState.isDragging = false;
                            document.body.style.userSelect = '';
                            return;
                        } else if (Math.abs(rawDelta) > 5) {
                            this.dragState.isAxisLocked = true;
                            if (isMobileView && this.dragState.direction === 0) {
                                this.dragState.direction = rawDelta > 0 ? 1 : -1;
                            }
                        } else {
                            return;
                        }
                    }

                    if (isMobileView) {
                        const activePage = this.state.mobileTab === 'left' ? this.dom.pageLeft : this.dom.pageRight;
                        activePage.style.transition = 'none';
                        activePage.style.transform = `translateX(${-rawDelta}px)`;
                        if (e.cancelable) e.preventDefault();
                        return;
                    }
                    
                    if (this.dragState.direction === 1) {
                        let delta = Math.min(Math.max(rawDelta, 0), window.innerWidth / 1.5); 
                        let rotation = delta / 2.5;
                        
                        this.dom.pageRight.style.transform = `rotateY(${-rotation}deg)`;
                        this.dom.curlRight.style.transform = `rotateY(${-rotation}deg)`;
                        this.dom.curlRight.style.opacity = '1';
                    } else if (this.dragState.direction === -1) {
                        let delta = Math.min(Math.max(-rawDelta, 0), window.innerWidth / 1.5);
                        let rotation = delta / 2.5; 
                        
                        this.dom.pageLeft.style.transform = `rotateY(${rotation}deg)`;
                        this.dom.curlLeft.style.transform = `rotateY(${rotation}deg)`;
                        this.dom.curlLeft.style.opacity = '1';
                    }
                };

                const endDrag = (e) => {
                    if (!this.dragState.isDragging) return;
                    this.dragState.isDragging = false;
                    document.body.style.userSelect = '';

                    let clientX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
                    let rawDelta = this.dragState.startX - clientX;
                    const isMobileView = window.innerWidth <= 768;

                    if (isMobileView) {
                        const threshold = window.innerWidth * 0.15;
                        const activePage = this.state.mobileTab === 'left' ? this.dom.pageLeft : this.dom.pageRight;
                        activePage.style.transition = 'transform 0.3s ease';
                        
                        if (rawDelta > threshold) {
                            if (this.state.mobileTab === 'left') {
                                this.setMobileTab('right');
                                activePage.style.transform = '';
                            } else if (this.state.currentSpread < initialBookData.length - 1) {
                                this.navigate(1, true);
                                activePage.style.transform = '';
                            } else {
                                activePage.style.transform = 'translateX(0)';
                            }
                        } else if (rawDelta < -threshold) {
                            if (this.state.mobileTab === 'right') {
                                this.setMobileTab('left');
                                activePage.style.transform = '';
                            } else if (this.state.currentSpread > 0) {
                                this.navigate(-1, true);
                                activePage.style.transform = '';
                            } else {
                                activePage.style.transform = 'translateX(0)';
                            }
                        } else {
                            activePage.style.transform = 'translateX(0)';
                        }
                        
                        setTimeout(() => activePage.style.transition = '', 300);
                        return;
                    }

                    if (this.dragState.direction === 1) {
                        this.dom.pageRight.style.transition = '0.6s';
                        this.dom.curlRight.style.transition = '0.6s';
                        
                        let currentRotation = 0;
                        const match = (this.dom.pageRight.style.transform || "").match(/rotateY\(([-\d.]+)deg\)/);
                        if (match) currentRotation = parseFloat(match[1]);

                        if (currentRotation < -60) {
                            this.dom.pageRight.style.transform = 'rotateY(-180deg)';
                            this.dom.curlRight.style.opacity = '0';
                            
                            setTimeout(() => {
                                this.dom.underlayRight.classList.add('hidden');
                                this.dom.pageRight.style.transition = '';
                                this.dom.curlRight.style.transition = '';
                                this.dom.pageRight.style.transform = '';
                                this.dom.curlRight.style.transform = '';
                                this.dom.pageRight.style.zIndex = '';
                                this.dom.pageLeft.style.zIndex = '';
                                this.navigate(1, true);
                            }, 600);
                        } else {
                            this.dom.pageRight.style.transform = 'rotateY(0deg)';
                            this.dom.curlRight.style.transform = 'rotateY(0deg)';
                            this.dom.curlRight.style.opacity = '0';
                            
                            setTimeout(() => {
                                this.dom.underlayRight.classList.add('hidden');
                                this.dom.pageRight.style.transition = '';
                                this.dom.curlRight.style.transition = '';
                                this.dom.pageRight.style.transform = '';
                                this.dom.curlRight.style.transform = '';
                                this.dom.pageRight.style.zIndex = '';
                                this.dom.pageLeft.style.zIndex = '';
                            }, 600);
                        }
                    } else if (this.dragState.direction === -1) {
                        this.dom.pageLeft.style.transition = '0.6s';
                        this.dom.curlLeft.style.transition = '0.6s';
                        
                        let currentRotation = 0;
                        const match = (this.dom.pageLeft.style.transform || "").match(/rotateY\(([-\d.]+)deg\)/);
                        if (match) currentRotation = parseFloat(match[1]);

                        if (currentRotation > 60) {
                            this.dom.pageLeft.style.transform = 'rotateY(180deg)';
                            this.dom.curlLeft.style.opacity = '0';
                            
                            setTimeout(() => {
                                this.dom.underlayLeft.classList.add('hidden');
                                this.dom.pageLeft.style.transition = '';
                                this.dom.curlLeft.style.transition = '';
                                this.dom.pageLeft.style.transform = '';
                                this.dom.curlLeft.style.transform = '';
                                this.dom.pageLeft.style.zIndex = '';
                                this.dom.pageRight.style.zIndex = '';
                                this.navigate(-1, true);
                            }, 600);
                        } else {
                            this.dom.pageLeft.style.transform = 'rotateY(0deg)';
                            this.dom.curlLeft.style.transform = 'rotateY(0deg)';
                            this.dom.curlLeft.style.opacity = '0';
                            
                            setTimeout(() => {
                                this.dom.underlayLeft.classList.add('hidden');
                                this.dom.pageLeft.style.transition = '';
                                this.dom.curlLeft.style.transition = '';
                                this.dom.pageLeft.style.transform = '';
                                this.dom.curlLeft.style.transform = '';
                                this.dom.pageLeft.style.zIndex = '';
                                this.dom.pageRight.style.zIndex = '';
                            }, 600);
                        }
                    }
                };

                this.dom.spreadContainer.addEventListener('mousedown', startDrag);
                document.addEventListener('mousemove', doDrag);
                document.addEventListener('mouseup', endDrag);

                this.dom.spreadContainer.addEventListener('touchstart', startDrag, { passive: true });
                document.addEventListener('touchmove', doDrag, { passive: false });
                document.addEventListener('touchend', endDrag);

                this.renderSpread();
            },

                this.dom.polaroidTrigger.classList.add('opacity-0', 'pointer-events-none');
